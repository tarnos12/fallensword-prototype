# Deploy the game to GitHub Pages. No build step — the repo root IS the site
# (pure HTML/JS/CSS ES modules with relative paths, so the /fallensword-prototype/
# subpath works as-is). configure-pages `enablement: true` creates/enables the
# Pages site on first run, so no manual Settings → Pages step is needed.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

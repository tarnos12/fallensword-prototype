# Publish the game to GitHub Pages via the classic gh-pages branch.
# (configure-pages `enablement: true` cannot create the Pages site — that needs
# repo-admin scope the workflow token doesn't have. Pushing a gh-pages branch
# auto-publishes on public repos with no Settings step.)
# No build step — master's tree IS the site (relative paths work under the
# /fallensword-prototype/ subpath). .nojekyll (in the tree) skips Jekyll.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror master to gh-pages
        run: git push --force origin HEAD:gh-pages
